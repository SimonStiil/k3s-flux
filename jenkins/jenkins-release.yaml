---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jenkins
  namespace: flux-system
spec:
  chart:
    spec:
      chart: jenkins
      version: 5.9.9
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: jenkins
  interval: 1m0s
  targetNamespace: jenkins
  values:
    controller:
      JCasC:
        configScripts:
          email-ext: |-
            unclassified:
              email-ext:
                adminRequiredForTemplateTesting: false
                allowUnregisteredEnabled: false
                charset: "UTF-8"
                debugMode: false
                defaultBody: |-
                  $PROJECT_NAME - Build # $BUILD_NUMBER - $BUILD_STATUS:
                  Check console output at $BUILD_URL to view the results.
                defaultContentType: "text/plain"
                defaultRecipients: "${githubemail:=undefined}"
                defaultSubject: "$PROJECT_NAME - Build # $BUILD_NUMBER - $BUILD_STATUS!"
                defaultSuffix: "@gmail.com"
                defaultTriggerIds:
                - "hudson.plugins.emailext.plugins.trigger.FailureTrigger"
                mailAccount:
                  credentialsId: "email-secret"
                  smtpHost: "send.one.com"
                  smtpPort: "465"
                  useSsl: true
                maxAttachmentSize: -1
                maxAttachmentSizeMb: -1
                precedenceBulk: false
                watchingEnabled: false
          github: |-
            unclassified:
              gitHubConfiguration:
                apiRateLimitChecker: ThrottleForNormalize
              gitHubPluginConfig:
                configs:
                - credentialsId: "github-token-secret"
                  name: "SimonStiil Org"
                hookUrl: "https://jenkins.${topleveldomain:=undefined}/github-webhook/"
              scmGit:
                globalConfigEmail: "${githubemail:=undefined}"
                globalConfigName: "SimonStiil"
#          ldap-settings: |-
#            jenkins:
#              securityRealm:
#                ldap:
#                  configurations:
#                  - groupMembershipStrategy:
#                      fromUserRecord:
#                        attributeName: "memberOf"
#                    groupSearchBase: "cn=groups"
#                    groupSearchFilter: "(& (cn={0}) (objectClass=posixGroup))"
#                    inhibitInferRootDN: false
#                    managerDN: "uid=svc-jenkins,cn=users,${ldapclusterdomain:=undefined}"
#                    managerPasswordSecret: $${ldap-secret-password}
#                    rootDN: "${ldapclusterdomain:=undefined}"
#                    server: "ldaps://diskstation.${topleveldomain:=undefined}"
#                    userSearchBase: "cn=users"
#                  disableMailAddressResolver: false
#                  disableRolePrefixing: true
#                  groupIdStrategy: "caseInsensitive"
#                  userIdStrategy: "caseInsensitive"
          oidc-settings: |-
            jenkins:
              securityRealm:
                oic:
                  clientId: "jenkins"
                  clientSecret: $${oidc-secret-secret}
                  disableSslVerification: false
                  emailFieldName: "email"
                  fullNameFieldName: "name"
                  groupIdStrategy: "caseSensitive"
                  groupsFieldName: "groups"
                  logoutFromOpenidProvider: false
                  properties:
                    - "pkce"
                    - escapeHatch:
                        group: "admin-users"
                        secret: "escapeHatch"
                        username: "escapeHatch"
                  sendScopesInTokenRequest: true
                  serverConfiguration:
                    wellKnown:
                      scopesOverride: "openid profile email groups"
                      wellKnownOpenIDConfigurationUrl: "https://auth.${topleveldomain:=undefined}/.well-known/openid-configuration"
                  userIdStrategy: "caseSensitive"
                  userNameField: "preferred_username"
          pipeline-library: |-
            unclassified:
              globalLibraries:
                libraries:
                - defaultVersion: "main"
                  name: "pipeline-library"
                  retriever:
                    modernSCM:
                      scm:
                        github:
                          configuredByUrl: true
                          credentialsId: "github-login-secret"
                          id: "2140d28d-d704-4e67-8119-41a227e893b5"
                          repoOwner: "SimonStiil"
                          repository: "pipeline-library"
                          repositoryUrl: "https://github.com/SimonStiil/pipeline-library"
                          traits:
                          - gitHubBranchDiscovery:
                              strategyId: 1
                          - gitHubPullRequestDiscovery:
                              strategyId: 1
                          - gitHubForkDiscovery:
                              strategyId: 1
                              trust: "gitHubTrustPermissions"
          monitoring: |-
            unclassified:
              prometheusConfiguration:
                collectDiskUsage: false
      additionalExistingSecrets:
#      - keyName: password
#        name: ldap-secret
      - keyName: secret
        name: oidc-secret
      additionalPlugins:
      - ldap
      - http_request
      - pipeline-maven
      - pipeline-utility-steps
      - pipeline-stage-view
      - pipeline-github
      - oic-auth                          # https://plugins.jenkins.io/oic-auth/ & https://www.authelia.com/integration/openid-connect/clients/jenkins/
      - gitea                             # https://plugins.jenkins.io/gitea/
      - gitea-checks                      # https://plugins.jenkins.io/gitea-checks/
      - gitea-pat-kubernetes-credentials  # https://plugins.jenkins.io/gitea-pat-kubernetes-credentials/
      - github-api
      - github-branch-source
      - github-checks
#      - github-autostatus
      - job-dsl
      - basic-branch-build-strategies
      - email-ext
      - mailer
      - timestamper
      - kubernetes-credentials-provider
      - credentials-binding
      - generic-webhook-trigger
      - prometheus
      ingress:
        annotations:
          traefik.ingress.kubernetes.io/router.tls: "true"
          traefik.ingress.kubernetes.io/router.entrypoints: websecure,web
        labels:
          external-dns-export: "true"
          tooc.k8s.stiil.dk/export: "true"
          tooc.k8s.stiil.dk/ssl-type: reencrypt
        apiVersion: networking.k8s.io/v1
        enabled: true
        hostName: jenkins.${topleveldomain:=undefined}
        ingressClassName: traefik
      jenkinsAdminEmail: robot@${topleveldomain:=undefined}
      jenkinsUrl: https://jenkins.${topleveldomain:=undefined}
      resources:
        limits:
          memory: 8192Mi
        requests:
          cpu: 200m
          memory: 2048Mi
      javaOpts: >-
        -Dhudson.model.ParametersAction.safeParameters=jenkins-generic-webhook-trigger-plugin_uuid 
        -Dorg.jenkinsci.plugins.durabletask.BourneShellScript.LAUNCH_DIAGNOSTICS=true
    persistence:
      storageClass: local-path
    rbac:
      create: true
      readSecrets: true
