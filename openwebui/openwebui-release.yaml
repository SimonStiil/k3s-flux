---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui-aio
  namespace: flux-system
spec:
  chart:
    spec:
      chart: open-webui
      version: "14.2.0"
      sourceRef:
        kind: HelmRepository
        name: open-webui 
        namespace: flux-system
  interval: 15m0s
  targetNamespace: openwebui
  values:
    ollama:
      enabled: true
#      image:
#        tag: 0.12.5-rocm
      ollama:
        gpu:
          # -- Enable GPU integration
          enabled: false
          # -- GPU type: 'nvidia' or 'amd'
          type: 'amd'
      
          # -- Specify the number of GPU to 1
          number: 1
      persistentVolume:
        enabled: true
        size: 200Gi
        storageClass: local-path
      volumes:
        - name: dev-dri
          hostPath:
            path: /dev/dri
        - name: dev-kfd
          hostPath:
            path: /dev/kfd
      volumeMounts:
        - name: dev-dri
          mountPath: /dev/dri
        - name: dev-kfd
          mountPath: /dev/kfd
      podSecurityContext:
        supplementalGroups: [27, 44, 993] #sudo, video, render groups
      securityContext:
        privileged: true
      podAnnotations:
        container.apparmor.security.beta.kubernetes.io/ollama: "unconfined"

      # Configure the ingress resource that allows you to access the
      ingress:
        # -- Enable ingress controller resource
        enabled: true

        # -- IngressClass that will be used to implement the Ingress (Kubernetes 1.18+)
        className: "traefik"

        # -- Additional annotations for the Ingress resource.
        annotations: 
          traefik.ingress.kubernetes.io/router.entrypoints: websecure,web
          traefik.ingress.kubernetes.io/router.tls: "true"
          cert-manager.io/cluster-issuer: stiil-issuer

        # The list of hostnames to be covered with this ingress record.
        hosts:
          - host: ollama.k3s.${homedomain:=undefined}
            paths:
              - path: /
                pathType: Prefix
        # --  The tls configuration for hostnames to be covered with this ingress record.
        tls: 
          - hosts:
            - ollama.k3s.${homedomain:=undefined}
            secretName: ollama-home-cert
          
    tika:
      # -- Automatically install Apache Tika to extend Open WebUI
      # @section -- External Tools configuration
      enabled: false
    ingress:
      enabled: true
      class: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.entrypoints: websecure,web
      host: "chat.${topleveldomain:=undefined}"
      additionalHosts: []
      extraLabels: 
        external-dns-export: "true"
        tooc.k8s.stiil.dk/export: "true"
        tooc.k8s.stiil.dk/ssl-type: reencrypt
     
    persistence:
      s3:
        bucket: "open-webui"
        region: "us-east-1"
        accessKeyExistingSecret: "openwebui-creds"
        accessKeyExistingAccessKey: "access-key"
        secretKeyExistingSecret: "openwebui-creds"
        secretKeyExistingSecretKey: "secret-key"
        endpointUrl: "https://minio.${topleveldomain:=undefined}"
    enableOpenaiApi: false
    sso:
      enabled: true
      enableSignup: true
      mergeAccountsByEmail: true
      enableRoleManagement: true
      oidc:
        enabled: true
        clientId: "148d773e-677d-4b36-bf14-83bdadd0ba12"
        clientExistingSecret: "openwebui-creds"
        clientExistingSecretKey: "oauth-client-secret"
        providerUrl: "https://auth.${topleveldomain:=undefined}/.well-known/openid-configuration"
        providerName: "authelia"
        scopes: "openid email profile groups"
      roleManagement:
        rolesClaim: "groups"
        allowedRoles: "administrators,developer,users"
        adminRoles: "administrators"
    extraEnvVars:
      - name: OPENID_REDIRECT_URI
        value: "https://chat.${topleveldomain:=undefined}/oauth/oidc/callback"
      - name: OAUTH_CODE_CHALLENGE_METHOD
        value: "S256"
      - name: ENABLE_LOGIN_FORM
        value: "true"
      - name: ENABLE_WEB_SEARCH
        value: "true"
      - name: WEB_SEARCH_ENGINE
        value: "searxng"
      - name: SEARXNG_QUERY_URL
        value: "http://search.${topleveldomain:=undefined}/search?q=<query>"
    